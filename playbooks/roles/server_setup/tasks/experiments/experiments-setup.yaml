---

- name: Run Stash container
  become: true
  community.docker.docker_container:
      name: stash
      image: "stashapp/stash:v0.30.1"
      restart_policy: unless-stopped
      env:
        STASH_STASH: "/data/"
        STASH_GENERATED: "/generated/"
        STASH_METADATA: "/metadata/"
        STASH_CACHE: "/cache/"
      published_ports:
        - "9999:9999"
      volumes:
        - "/mnt/media/Stash/data:/data"
        - "/mnt/media/Stash/generated:/generated"
        - "/mnt/media/Stash/metadata:/metadata"
        - "/mnt/media/Stash/cache:/cache"
        - "/mnt/media/Stash/blob:/blob"
        - "/mnt/media/Stash/config:/root/.stash"
...